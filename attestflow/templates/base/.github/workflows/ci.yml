name: Harness Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Attestflow
        run: python -m pip install git+https://github.com/neaomiao/attestflow.git
      - name: Verify harness
        run: python -m attestflow verify
